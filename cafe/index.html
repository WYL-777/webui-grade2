<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe OCC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- header  -->
    <header>
        <h1>Cafe OCC</h1>

        <nav>
          <a href="#about">about</a>
          <a href="#menu">menu</a>
          <a href="#access">access</a>
        </nav>

        <button>Theme</button>
    </header>
    
    <!-- main -->
    <main>
        <!-- Hero section -->
        <section id="hero">
            <h2>One coffee in the morning sunlight</h2>
            <p>With peaceful refreshment of Cafe</p>
        </section>

        <!-- About section -->
        <section id="about">
            <h2>About</h2>
            <p>Open in 2026, Let make fragment of coffee bean</p>
            <p>Welcome to those comes with family or alone</p>
        </section>

        <!-- Menu section -->
        <section id="menu">
            <h2>Menu</h2>
            <div class="recommend">
                <h3>Recommend</h3>
                <p>If you need recommendation about our product, allow me to do it</p>
                <button onclick="pickRecommend()" class="recommend.btn"> recommendation</button>
            </div>
        </section>

    </main>
    <!-- footer -->
    <footer>

    </footer>
</body>
</html>
